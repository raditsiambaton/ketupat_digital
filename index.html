<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ketupat Berhadiah - Idul Fitri 1447 H</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        emerald: { 800: '#065f46', 900: '#064e3b', 950: '#022c22' },
                        gold: { 300: '#fde047', 400: '#facc15', 500: '#eab308' },
                    },
                    fontFamily: {
                        montserrat: ['Montserrat', 'sans-serif'],
                        amiri: ['Amiri', 'serif'],
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background: radial-gradient(circle at top, #065f46 0%, #022c22 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animasi Lentera/Ketupat Bergoyang */
        .sway {
            transform-origin: top center;
            animation: sway 3s ease-in-out infinite alternate;
        }
        @keyframes sway {
            0% { transform: rotate(-6deg); }
            100% { transform: rotate(6deg); }
        }

        /* Animasi Terbelah (Split Animation) */
        .ketupat-left, .ketupat-right {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            transition: transform 0.7s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.6s ease;
            pointer-events: none; /* Agar klik diteruskan ke parent */
        }
        
        .ketupat-left {
            clip-path: polygon(0 0, 50% 0, 50% 100%, 0 100%);
        }
        
        .ketupat-right {
            clip-path: polygon(50% 0, 100% 0, 100% 100%, 50% 100%);
        }

        /* State Saat Ketupat Terbuka */
        .open .ketupat-left {
            transform: translateX(-70px) translateY(20px) rotate(-25deg) scale(0.8);
            opacity: 0;
        }
        
        .open .ketupat-right {
            transform: translateX(70px) translateY(20px) rotate(25deg) scale(0.8);
            opacity: 0;
        }

        /* Kartu Ucapan yang Muncul */
        .quote-card {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0.3);
            opacity: 0;
            transition: all 0.7s cubic-bezier(0.34, 1.56, 0.64, 1);
            width: 240px;
            z-index: 10;
            pointer-events: none;
        }

        .open .quote-card {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
        }
    </style>
</head>
<body class="flex flex-col items-center pt-12 pb-24 text-white font-montserrat relative">

    <audio id="pop-sound" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3" preload="auto"></audio>

    <div class="text-center z-10 px-4">
        <h1 class="text-5xl md:text-6xl font-amiri text-gold-400 font-bold drop-shadow-[0_5px_5px_rgba(0,0,0,0.5)] mb-3">Idul Fitri 1447 H</h1>
        <p class="text-base md:text-lg text-emerald-100 font-medium">Klik dan pecahkan ketupatnya untuk menemukan ucapan! ✨</p>
    </div>

    <div class="mt-8 mb-20 z-10">
        <h2 class="text-center text-sm text-gold-300 tracking-widest uppercase mb-3 font-semibold">Menuju 1 Syawal</h2>
        <div class="flex gap-3 md:gap-6 justify-center" id="countdown-container">
            <div class="flex flex-col items-center bg-white/10 backdrop-blur-md border border-white/20 p-3 md:p-4 rounded-2xl min-w-[70px] md:min-w-[90px] shadow-xl">
                <span id="days" class="text-3xl md:text-4xl font-bold text-white">00</span>
                <span class="text-[10px] md:text-xs text-gold-400 uppercase tracking-wider mt-1">Hari</span>
            </div>
            <div class="flex flex-col items-center bg-white/10 backdrop-blur-md border border-white/20 p-3 md:p-4 rounded-2xl min-w-[70px] md:min-w-[90px] shadow-xl">
                <span id="hours" class="text-3xl md:text-4xl font-bold text-white">00</span>
                <span class="text-[10px] md:text-xs text-gold-400 uppercase tracking-wider mt-1">Jam</span>
            </div>
            <div class="flex flex-col items-center bg-white/10 backdrop-blur-md border border-white/20 p-3 md:p-4 rounded-2xl min-w-[70px] md:min-w-[90px] shadow-xl">
                <span id="minutes" class="text-3xl md:text-4xl font-bold text-white">00</span>
                <span class="text-[10px] md:text-xs text-gold-400 uppercase tracking-wider mt-1">Menit</span>
            </div>
            <div class="flex flex-col items-center bg-white/10 backdrop-blur-md border border-white/20 p-3 md:p-4 rounded-2xl min-w-[70px] md:min-w-[90px] shadow-xl">
                <span id="seconds" class="text-3xl md:text-4xl font-bold text-white">00</span>
                <span class="text-[10px] md:text-xs text-gold-400 uppercase tracking-wider mt-1">Detik</span>
            </div>
        </div>
    </div>

    <div class="flex flex-wrap justify-center gap-x-12 md:gap-x-20 gap-y-32 max-w-5xl px-8 z-10" id="ketupat-grid">
        </div>

    <script>
        // Data Ucapan yang berbeda-beda
        const quotes = [
            "Taqabbalallahu minna wa minkum. Selamat Lebaran! Mohon maaf lahir dan batin ya. 🙏",
            "Ketupat udah mateng nih! Maafkan segala salah dan khilafku selama ini. Selamat Hari Raya!",
            "Minal Aidin Wal Faizin. Semoga Allah memberkahi langkah kita ke depannya. ✨",
            "Meski belum bisa jabat tangan, lewat ketupat virtual ini aku minta maaf setulus hati. 💚",
            "Bila ada kata merangkai dusta, mohon dimaafkan. Selamat Idul Fitri 1447 H! 🌙",
            "Sucikan hati, jernihkan pikiran. Selamat merayakan hari kemenangan bersama keluarga tercinta!"
        ];

        // Menyimpan status quote yang sudah dipakai agar tidak double (jika memungkinkan)
        let availableQuotes = [...quotes];

        // Template SVG Ketupat
        const ketupatSVG = `
        <svg viewBox="-10 -20 120 140" class="w-full h-full drop-shadow-[0_15px_15px_rgba(0,0,0,0.6)]">
            <path d="M50,5 Q35,-15 25,-10" stroke="#047857" stroke-width="5" fill="none" stroke-linecap="round"/>
            <path d="M50,5 Q65,-15 75,-10" stroke="#facc15" stroke-width="5" fill="none" stroke-linecap="round"/>
            <path d="M50,95 Q35,115 25,110" stroke="#facc15" stroke-width="5" fill="none" stroke-linecap="round"/>
            <path d="M50,95 Q65,115 75,110" stroke="#047857" stroke-width="5" fill="none" stroke-linecap="round"/>
            
            <polygon points="50,5 95,50 50,95 5,50" fill="#064e3b" stroke="#facc15" stroke-width="3" stroke-linejoin="round"/>
            
            <polygon points="50,5 72.5,27.5 50,50 27.5,27.5" fill="#047857"/>
            <polygon points="72.5,27.5 95,50 72.5,72.5 50,50" fill="#10b981"/>
            <polygon points="27.5,27.5 50,50 27.5,72.5 5,50" fill="#10b981"/>
            <polygon points="50,50 72.5,72.5 50,95 27.5,72.5" fill="#047857"/>
            
            <line x1="5" y1="50" x2="95" y2="50" stroke="#facc15" stroke-width="2"/>
            <line x1="50" y1="5" x2="50" y2="95" stroke="#facc15" stroke-width="2"/>
        </svg>`;

        // Render 4 Ketupat secara dinamis
        const grid = document.getElementById('ketupat-grid');
        const delays = ['0s', '-1s', '-2.5s', '-1.5s']; // Delay berbeda agar ayunannya tidak barengan

        for(let i=0; i<4; i++) {
            grid.innerHTML += `
            <div class="sway relative" style="animation-delay: ${delays[i]};">
                <div class="relative cursor-pointer group ketupat-container w-28 h-28 md:w-32 md:h-32 hover:scale-105 transition-transform" onclick="openKetupat(this)">
                    
                    <div class="absolute left-1/2 -translate-x-1/2 bottom-[90%] w-[2px] h-[120px] bg-gradient-to-t from-gold-500 to-transparent"></div>
                    
                    <div class="quote-card bg-emerald-950/90 backdrop-blur-xl border border-gold-400 p-5 rounded-2xl shadow-[0_0_20px_rgba(250,204,21,0.3)] text-center flex flex-col items-center">
                        <i data-lucide="sparkles" class="text-gold-400 w-6 h-6 mb-2"></i>
                        <p class="text-[13px] leading-relaxed text-emerald-50 quote-text"></p>
                    </div>

                    <div class="ketupat-left">
                        ${ketupatSVG}
                    </div>
                    
                    <div class="ketupat-right">
                        ${ketupatSVG}
                    </div>
                </div>
            </div>`;
        }

        // Initialize Icons
        lucide.createIcons();

        // Fungsi Membuka Ketupat
        function openKetupat(element) {
            // Cegah klik berulang
            if (element.classList.contains('open')) return;

            // Mainkan suara pop
            const popSound = document.getElementById('pop-sound');
            popSound.currentTime = 0;
            popSound.play().catch(e => console.log("Audio play di-block", e));

            // Acak kutipan
            if (availableQuotes.length === 0) availableQuotes = [...quotes]; // Reset jika habis
            const randomIndex = Math.floor(Math.random() * availableQuotes.length);
            const selectedQuote = availableQuotes.splice(randomIndex, 1)[0];
            
            // Masukkan teks ke dalam card
            element.querySelector('.quote-text').innerText = selectedQuote;

            // Hentikan ayunan
            element.parentElement.classList.remove('sway');
            
            // Tambahkan class open untuk mentrigger animasi CSS
            element.classList.add('open');

            // Posisi Confetti (Dihitung sesuai posisi ketupat yang diklik di layar)
            const rect = element.getBoundingClientRect();
            const x = (rect.left + rect.width / 2) / window.innerWidth;
            const y = (rect.top + rect.height / 2) / window.innerHeight;

            // Ledakan Kembang Api / Confetti
            confetti({
                particleCount: 80,
                spread: 70,
                origin: { x: x, y: y },
                colors: ['#fbbf24', '#047857', '#ffffff', '#10b981'],
                disableForReducedMotion: true
            });
        }

        // Logika Countdown 1 Syawal 1447 H (Target: 21 Maret 2026)
        const targetDate = new Date("March 21, 2026 00:00:00").getTime();

        function updateCountdown() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            if (distance < 0) {
                document.getElementById("countdown-container").innerHTML = 
                    "<h3 class='text-2xl md:text-3xl font-bold text-gold-400 font-montserrat tracking-wide'>Hari Kemenangan Telah Tiba!</h3>";
                return;
            }

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = days.toString().padStart(2, '0');
            document.getElementById("hours").innerText = hours.toString().padStart(2, '0');
            document.getElementById("minutes").innerText = minutes.toString().padStart(2, '0');
            document.getElementById("seconds").innerText = seconds.toString().padStart(2, '0');
        }

        setInterval(updateCountdown, 1000);
        updateCountdown();
    </script>
</body>
</html>
